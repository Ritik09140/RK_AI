<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RK AI</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{--bg:#07080f;--accent:#00f0ff;--glow:rgba(0,240,255,.3);--text:#e2e8f0;--sub:#64748b;--panel:rgba(10,12,20,.9);--border:rgba(255,255,255,.07)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;background:radial-gradient(ellipse at 20% 50%,#0d0025 0%,#07080f 50%,#000d1a 100%)}
/* Stars */
#stars{position:fixed;inset:0;z-index:0;pointer-events:none}
/* Header */
header{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:.6rem 1.2rem;background:rgba(0,0,0,.6);border-bottom:1px solid var(--border);flex-shrink:0}
.logo{display:flex;align-items:center;gap:.5rem}
.logo-name{font-size:1.3rem;font-weight:800;letter-spacing:3px;color:var(--accent);text-shadow:0 0 10px var(--accent)}
.badge{background:rgba(0,240,255,.1);border:1px solid rgba(0,240,255,.3);border-radius:5px;padding:.1rem .5rem;font-size:.65rem;letter-spacing:1px;color:var(--accent)}
.langs{display:flex;gap:.3rem}
.lb{background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--sub);padding:.2rem .5rem;border-radius:5px;font-size:.68rem;font-weight:700;cursor:pointer;transition:.2s;font-family:'Outfit',sans-serif}
.lb:hover,.lb.active{background:rgba(0,240,255,.15);border-color:var(--accent);color:var(--accent)}
.status{display:flex;align-items:center;gap:.4rem;font-size:.7rem;color:var(--sub)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 6px var(--accent);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
/* Main */
main{position:relative;z-index:10;display:flex;flex:1;overflow:hidden}
/* Robot Panel */
.robot-panel{width:280px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;border-right:1px solid var(--border);background:rgba(0,0,0,.2);gap:1rem}
/* Robot Face SVG */
.robot-face{width:160px;height:160px;position:relative}
.robot-face svg{width:100%;height:100%;filter:drop-shadow(0 0 15px var(--accent))}
/* Robot rings */
.robot-rings{position:relative;width:200px;height:200px;display:flex;align-items:center;justify-content:center}
.ring{position:absolute;border-radius:50%;border:1px solid rgba(0,240,255,.2)}
.r1{width:190px;height:190px;animation:sp 18s linear infinite;border-top-color:var(--accent)}
.r2{width:150px;height:150px;animation:sr 12s linear infinite;border-bottom-color:rgba(138,43,226,.7)}
@keyframes sp{100%{transform:rotate(360deg)}}
@keyframes sr{100%{transform:rotate(-360deg)}}
.state-lbl{font-size:.75rem;letter-spacing:3px;color:var(--accent);text-transform:uppercase;transition:.3s}
.wake{font-size:.6rem;color:var(--sub);letter-spacing:1px}
.wake span{color:var(--accent)}
/* Chat */
.chat-side{flex:1;display:flex;flex-direction:column;padding:.8rem;overflow:hidden}
.chat-msgs{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:.8rem;padding-right:.4rem;scroll-behavior:smooth}
.chat-msgs::-webkit-scrollbar{width:3px}
.chat-msgs::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.msg{display:flex;gap:.6rem;animation:fu .3s ease forwards;opacity:0;transform:translateY(8px)}
@keyframes fu{to{opacity:1;transform:translateY(0)}}
.av{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;color:var(--accent);flex-shrink:0;font-size:.75rem}
.um .av{background:rgba(255,255,255,.15);color:#fff}
.mb{background:rgba(0,0,0,.45);padding:.6rem .85rem;border-radius:0 12px 12px 12px;border:1px solid rgba(255,255,255,.05);font-size:.85rem;line-height:1.65;max-width:88%}
.um .mb{border-radius:12px 0 12px 12px;background:rgba(0,240,255,.07);border-color:rgba(0,240,255,.2)}
.um{flex-direction:row-reverse}
.mt{display:block;font-size:.6rem;color:var(--sub);margin-top:.3rem;text-align:right}
.um .mt{text-align:left}
/* Controls */
.ctrl{margin-top:.6rem;display:flex;flex-direction:column;gap:.5rem}
.irow{display:flex;background:rgba(0,0,0,.5);border:1px solid var(--border);border-radius:10px;padding:.3rem;transition:.3s}
.irow:focus-within{border-color:var(--accent);box-shadow:0 0 10px rgba(0,240,255,.15)}
#inp{flex:1;background:transparent;border:none;color:var(--text);padding:.4rem .7rem;font-family:'Outfit',sans-serif;font-size:.9rem;outline:none}
#inp::placeholder{color:var(--sub)}
.sbtn{background:transparent;border:none;color:var(--accent);width:34px;height:34px;border-radius:7px;cursor:pointer;transition:.2s;font-size:.9rem}
.sbtn:hover{background:rgba(0,240,255,.1)}
.mrow{display:flex;align-items:center;justify-content:center;gap:.8rem}
.mbtn{width:50px;height:50px;border-radius:50%;border:none;background:linear-gradient(135deg,rgba(255,255,255,.1),rgba(0,0,0,.5));color:#fff;font-size:1.1rem;cursor:pointer;position:relative;transition:.3s;display:flex;align-items:center;justify-content:center}
.mbtn::before{content:'';position:absolute;inset:-4px;border-radius:50%;background:var(--accent);z-index:-1;opacity:.3;filter:blur(7px);transition:.3s}
.mbtn.on{background:linear-gradient(135deg,rgba(255,0,128,.8),rgba(138,43,226,.8))}
.mbtn.on::before{background:rgba(255,0,128,1);inset:-9px;animation:mp 1s infinite alternate}
.mbtn.off{background:linear-gradient(135deg,rgba(70,70,70,.5),rgba(30,30,30,.8))}
.mbtn.off::before{background:rgba(70,70,70,.3)}
@keyframes mp{0%{opacity:.25}100%{opacity:.75}}
.mlbl{font-size:.65rem;color:var(--sub);letter-spacing:1px;text-transform:uppercase}
/* Boot */
#boot{position:fixed;inset:0;background:#000;z-index:9999;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:opacity .8s}
.bi{text-align:center;color:var(--accent)}
.bspin{width:45px;height:45px;border-radius:50%;border:3px solid rgba(0,240,255,.2);border-top-color:var(--accent);animation:sp 1s linear infinite;margin:0 auto 1rem}
.bicon{font-size:2.8rem;margin-bottom:.7rem;display:block;text-shadow:0 0 18px var(--accent)}
.bi h2{letter-spacing:5px;font-weight:300;margin-bottom:.3rem;font-size:1.1rem}
.bi p{color:rgba(255,255,255,.3);font-size:.75rem;margin-bottom:1rem}
.tap{font-size:.7rem;letter-spacing:4px;animation:blink 1.5s infinite}
@media(max-width:650px){.robot-panel{display:none}}
</style>
</head>
<body>
<canvas id="stars"></canvas>

<div id="boot">
  <div class="bi">
    <div class="bspin"></div>
    <i class="fa-solid fa-robot bicon"></i>
    <h2>RK AI</h2>
    <p>By Ritik Boss</p>
    <div class="tap">TAP TO START</div>
  </div>
</div>

<header>
  <div class="logo">
    <i class="fa-solid fa-robot" style="color:var(--accent);font-size:1.2rem;text-shadow:0 0 8px var(--accent)"></i>
    <span class="logo-name">RK AI</span>
    <div class="badge">RITIK BOSS</div>
  </div>
  <div class="langs">
    <button class="lb active" data-lang="hi">HI</button>
    <button class="lb" data-lang="en">EN</button>
    <button class="lb" data-lang="gu">GU</button>
    <button class="lb" data-lang="mr">MR</button>
  </div>
  <div class="status"><div class="dot" id="dot"></div><span id="stxt">Online</span></div>
</header>

<main>
  <!-- Robot Panel -->
  <div class="robot-panel">
    <div class="robot-rings" id="robot-wrap">
      <div class="ring r1"></div>
      <div class="ring r2"></div>
      <!-- Robot Face SVG -->
      <svg id="robot-svg" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" style="width:110px;height:110px;position:absolute">
        <!-- Head -->
        <rect x="20" y="15" width="80" height="70" rx="15" fill="#0a0a1a" stroke="#00f0ff" stroke-width="2"/>
        <!-- Antenna -->
        <line x1="60" y1="15" x2="60" y2="5" stroke="#00f0ff" stroke-width="2"/>
        <circle cx="60" cy="4" r="3" fill="#00f0ff" id="antenna-dot">
          <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
        </circle>
        <!-- Eyes -->
        <ellipse id="eye-l" cx="42" cy="45" rx="10" ry="10" fill="#001a2e" stroke="#00f0ff" stroke-width="1.5"/>
        <ellipse id="eye-r" cx="78" cy="45" rx="10" ry="10" fill="#001a2e" stroke="#00f0ff" stroke-width="1.5"/>
        <!-- Eye pupils -->
        <circle id="pupil-l" cx="42" cy="45" r="5" fill="#00f0ff" opacity="0.9"/>
        <circle id="pupil-r" cx="78" cy="45" r="5" fill="#00f0ff" opacity="0.9"/>
        <!-- Eye glow -->
        <circle cx="42" cy="45" r="5" fill="#00f0ff" opacity="0.3" filter="url(#glow)"/>
        <circle cx="78" cy="45" r="5" fill="#00f0ff" opacity="0.3" filter="url(#glow)"/>
        <!-- Mouth - default smile -->
        <path id="mouth" d="M 40 68 Q 60 80 80 68" fill="none" stroke="#00f0ff" stroke-width="2.5" stroke-linecap="round"/>
        <!-- Cheek lights -->
        <circle cx="28" cy="58" r="4" fill="#ff0080" opacity="0.5"/>
        <circle cx="92" cy="58" r="4" fill="#ff0080" opacity="0.5"/>
        <!-- Neck -->
        <rect x="50" y="85" width="20" height="10" rx="3" fill="#0a0a1a" stroke="#00f0ff" stroke-width="1.5"/>
        <!-- Filter -->
        <defs>
          <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        </defs>
      </svg>
    </div>
    <div class="state-lbl" id="slbl">Ready</div>
    <div class="wake">Say <span>"Hey RK"</span></div>
  </div>

  <!-- Chat -->
  <div class="chat-side">
    <div class="chat-msgs" id="msgs"></div>
    <div class="ctrl">
      <div class="irow">
        <input type="text" id="inp" placeholder="Kuch bhi poochho..." autocomplete="off">
        <button class="sbtn" id="sbtn"><i class="fa-solid fa-paper-plane"></i></button>
      </div>
      <div class="mrow">
        <button class="mbtn on" id="mbtn"><i class="fa-solid fa-microphone" id="micon"></i></button>
        <span class="mlbl" id="mlbl">Mic On</span>
      </div>
    </div>
  </div>
</main>

<script>
const API='http://127.0.0.1:8001';
let lang='hi',micOn=true,isSpeaking=false,isRec=false;
let rec=null,voices=[],voiceGender='female',voiceRate=1.0;

// Stars
(function(){
  const c=document.getElementById('stars'),cx=c.getContext('2d');
  c.width=window.innerWidth;c.height=window.innerHeight;
  const stars=Array.from({length:180},()=>({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*1.3+0.2,o:Math.random(),s:Math.random()*0.004+0.001}));
  function draw(){cx.clearRect(0,0,c.width,c.height);stars.forEach(s=>{s.o+=s.s;if(s.o>1||s.o<0)s.s*=-1;cx.beginPath();cx.arc(s.x,s.y,s.r,0,Math.PI*2);cx.fillStyle=`rgba(160,130,255,${s.o})`;cx.fill();});requestAnimationFrame(draw);}
  draw();window.addEventListener('resize',()=>{c.width=window.innerWidth;c.height=window.innerHeight;});
})();

// Robot face elements
const robotWrap=document.getElementById('robot-wrap');
const mouth=document.getElementById('mouth');
const pupilL=document.getElementById('pupil-l');
const pupilR=document.getElementById('pupil-r');
const slbl=document.getElementById('slbl');
const stxt=document.getElementById('stxt');
const dot=document.getElementById('dot');

// Robot states
function setRobotState(s){
  const states={
    idle:{color:'#00f0ff',lbl:'Ready',status:'Online',mouth:'M 40 68 Q 60 80 80 68',eyeColor:'#00f0ff'},
    listening:{color:'#ff0080',lbl:'Sun raha hoon...',status:'Listening',mouth:'M 40 70 Q 60 78 80 70',eyeColor:'#ff0080'},
    thinking:{color:'#8a2be2',lbl:'Soch raha hoon...',status:'Thinking',mouth:'M 42 72 Q 60 72 78 72',eyeColor:'#8a2be2'},
    speaking:{color:'#00ffaa',lbl:'Bol raha hoon...',status:'Speaking',mouth:'M 38 65 Q 60 82 82 65',eyeColor:'#00ffaa'},
  };
  const st=states[s]||states.idle;
  slbl.textContent=st.lbl;slbl.style.color=st.color;
  dot.style.background=st.color;dot.style.boxShadow=`0 0 6px ${st.color}`;
  stxt.textContent=st.status;
  mouth.setAttribute('d',st.mouth);
  mouth.setAttribute('stroke',st.color);
  pupilL.setAttribute('fill',st.color);
  pupilR.setAttribute('fill',st.color);
  // Animate mouth when speaking
  if(s==='speaking'){
    mouth.style.animation='mouthAnim 0.3s ease-in-out infinite alternate';
  } else {
    mouth.style.animation='none';
  }
}

// Mouth animation via JS
let mouthAnim=null;
function startMouthAnim(){
  const paths=['M 38 65 Q 60 82 82 65','M 40 68 Q 60 78 80 68','M 38 65 Q 60 85 82 65','M 42 70 Q 60 76 78 70'];
  let i=0;
  mouthAnim=setInterval(()=>{
    if(mouth) mouth.setAttribute('d',paths[i%paths.length]);
    i++;
  },200);
}
function stopMouthAnim(){
  if(mouthAnim){clearInterval(mouthAnim);mouthAnim=null;}
}

// Eye blink
setInterval(()=>{
  const el=document.getElementById('eye-l');
  const er=document.getElementById('eye-r');
  if(el&&er){
    el.setAttribute('ry','2');er.setAttribute('ry','2');
    setTimeout(()=>{el.setAttribute('ry','10');er.setAttribute('ry','10');},150);
  }
},4000);

// Chat
const msgs=document.getElementById('msgs');
const inp=document.getElementById('inp');
const mbtn=document.getElementById('mbtn');
const micon=document.getElementById('micon');
const mlbl=document.getElementById('mlbl');

function addMsg(text,isUser=false){
  const d=document.createElement('div');
  d.className='msg'+(isUser?' um':'');
  const t=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  d.innerHTML=`<div class="av"><i class="fa-solid ${isUser?'fa-user':'fa-robot'}"></i></div><div class="mb">${text}<span class="mt">${t}</span></div>`;
  msgs.appendChild(d);
  msgs.scrollTop=msgs.scrollHeight;
}

// TTS - Better voice
function lcode(l){return {hi:'hi-IN',en:'en-US',gu:'gu-IN',mr:'mr-IN'}[l]||'hi-IN';}
window.speechSynthesis.onvoiceschanged=()=>{voices=window.speechSynthesis.getVoices();};
setTimeout(()=>{voices=window.speechSynthesis.getVoices();},800);

function speak(text){
  if(!window.speechSynthesis){done();return;}
  window.speechSynthesis.cancel();
  isSpeaking=true;
  setRobotState('speaking');
  startMouthAnim();
  // Split into sentences for natural speech
  const sentences=text.match(/[^।.!?]+[।.!?]*/g)||[text];
  let idx=0;
  function speakNext(){
    if(idx>=sentences.length){done();return;}
    const u=new SpeechSynthesisUtterance(sentences[idx].trim().replace(/[*_`#]/g,''));
    u.lang=lcode(lang);
    u.rate=voiceRate;
    u.pitch=voiceGender==='female'?1.2:0.8;
    u.volume=1.0;
    const lc=lcode(lang);
    // Pick best voice
    let v=null;
    if(voiceGender==='female'){
      v=voices.find(v=>v.lang===lc&&v.name.toLowerCase().includes('female'))
       ||voices.find(v=>v.lang===lc&&(v.name.includes('Google')||v.name.includes('Microsoft')))
       ||voices.find(v=>v.lang===lc)
       ||voices.find(v=>v.lang.startsWith(lc.split('-')[0]))
       ||voices.find(v=>v.lang.startsWith('hi'));
    } else {
      v=voices.find(v=>v.lang===lc&&v.name.toLowerCase().includes('male'))
       ||voices.find(v=>v.lang===lc)
       ||voices.find(v=>v.lang.startsWith(lc.split('-')[0]));
    }
    if(v)u.voice=v;
    u.onend=()=>{idx++;speakNext();};
    u.onerror=()=>{idx++;speakNext();};
    window.speechSynthesis.speak(u);
    idx++;
    // Fix Chrome bug - restart if stuck
    setTimeout(()=>{if(isSpeaking&&window.speechSynthesis.paused)window.speechSynthesis.resume();},1000);
  }
  speakNext();
}

function done(){
  isSpeaking=false;
  stopMouthAnim();
  setRobotState('idle');
  resumeMic();
}

// Send
async function send(msg){
  msg=msg.trim();
  if(!msg)return;
  addMsg(msg,true);
  inp.value='';
  setRobotState('thinking');
  pauseMic();

  // Voice control commands (client-side)
  const tl=msg.toLowerCase();
  if(tl.includes('female voice')||tl.includes('ladki ki awaaz')||tl.includes('girl voice')){
    voiceGender='female';
    addMsg('Voice female kar di Boss! 🎀',false);
    speak('Voice female kar di Boss!');return;
  }
  if(tl.includes('male voice')||tl.includes('ladka ki awaaz')||tl.includes('boy voice')){
    voiceGender='male';
    addMsg('Voice male kar di Boss! 🎤',false);
    speak('Voice male kar di Boss!');return;
  }
  if(tl.includes('slow bolo')||tl.includes('dheere bolo')){
    voiceRate=0.75;
    addMsg('Ab dheere bolunga Boss! 🐢',false);
    speak('Ab dheere bolunga Boss!');return;
  }
  if(tl.includes('fast bolo')||tl.includes('tez bolo')){
    voiceRate=1.4;
    addMsg('Ab tez bolunga Boss! ⚡',false);
    speak('Ab tez bolunga Boss!');return;
  }
  if(tl.includes('normal speed')||tl.includes('normal bolo')){
    voiceRate=1.0;
    addMsg('Normal speed pe aa gaya Boss! 👍',false);
    speak('Normal speed pe aa gaya Boss!');return;
  }
  if(tl.includes('sat saheb')||tl.includes('sat sahib')){
    addMsg('Sat Saheb Ji 🙏',false);
    speak('Sat Saheb Ji');return;
  }

  try{
    const r=await fetch(API+'/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg,lang,session:'default'})});
    const data=await r.json();
    if(data.action&&data.action.startsWith('set_lang_')){
      lang=data.action.split('_')[2];
      document.querySelectorAll('.lb').forEach(b=>b.classList.toggle('active',b.dataset.lang===lang));
      if(rec)rec.lang=lcode(lang);
    }
    const reply=data.reply||'Okay Boss!';
    addMsg(reply,false);
    setRobotState('speaking');
    speak(reply);
  }catch(e){
    console.error(e);
    const em='Boss, server se connect nahi hua. RK_AI.bat se server start karo.';
    addMsg(em,false);
    speak(em);
  }
}

// Speech Recognition
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
if(SR){
  rec=new SR();
  rec.continuous=true;
  rec.interimResults=false;
  rec.lang=lcode(lang);
  rec.maxAlternatives=1;
  rec.onstart=()=>{isRec=true;if(!isSpeaking)setRobotState('listening');};
  rec.onresult=(e)=>{
    const tr=e.results[e.resultIndex][0].transcript.trim();
    if(!tr)return;
    if(isSpeaking){
      if(['chup','stop','ruk','quiet','band karo'].some(w=>tr.toLowerCase().includes(w))){
        window.speechSynthesis.cancel();isSpeaking=false;stopMouthAnim();setRobotState('idle');
      }
      return;
    }
    const tl=tr.toLowerCase();
    if(tl.includes('hey rk')||tl.includes('hey r k')){
      addMsg('Hey RK — Activated!',true);
      speak('Haan Boss, main sun raha hoon. Boliye.');return;
    }
    send(tr);
  };
  rec.onerror=(e)=>{if(e.error!=='no-speech')console.warn('[MIC]',e.error);};
  rec.onend=()=>{isRec=false;if(micOn&&!isSpeaking)setTimeout(resumeMic,400);else setRobotState('idle');};
}

function pauseMic(){if(rec&&isRec){try{rec.abort();}catch(e){}}}
function resumeMic(){if(rec&&micOn&&!isRec&&!isSpeaking){try{rec.start();}catch(e){}}}

mbtn.addEventListener('click',()=>{
  micOn=!micOn;
  if(micOn){mbtn.className='mbtn on';micon.className='fa-solid fa-microphone';mlbl.textContent='Mic On';resumeMic();}
  else{mbtn.className='mbtn off';micon.className='fa-solid fa-microphone-slash';mlbl.textContent='Mic Off';pauseMic();setRobotState('idle');}
});

document.querySelectorAll('.lb').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.lb').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');lang=b.dataset.lang;
    if(rec)rec.lang=lcode(lang);
  });
});

document.getElementById('sbtn').addEventListener('click',()=>send(inp.value));
inp.addEventListener('keypress',e=>{if(e.key==='Enter')send(inp.value);});

// Boot
const GREET='Hello Boss! Main RK hoon. Boliye, kya karu?';
document.getElementById('boot').addEventListener('click',function(){
  this.style.opacity='0';
  setTimeout(()=>{
    this.remove();
    addMsg(GREET,false);
    setRobotState('speaking');
    speak(GREET);
    setTimeout(resumeMic,1500);
  },800);
});

setRobotState('idle');
setTimeout(()=>{if(micOn&&rec)resumeMic();},1000);
</script>
</body>
</html>
